<section class="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-6 space-y-4"><h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">1. Nivel</h2><div class="space-y-3"><p class="text-[9px] font-semibold uppercase tracking-widest text-slate-600">Bases Curriculares 2012</p><div class="grid grid-cols-2 sm:grid-cols-4 gap-2"><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200">5° Básico</button><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200">6° Básico</button><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200">7° Básico</button><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200">8° Básico</button></div><p class="text-[9px] font-semibold uppercase tracking-widest text-slate-600">Bases Curriculares 2015</p><div class="grid grid-cols-2 gap-2 max-w-xs"><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200">1° Medio</button><button type="button" class="py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 bg-rose-600 border-rose-500 text-white shadow-lg shadow-rose-600/25">2° Medio</button></div></div></section><section class="bg-gradient-to-r from-amber-900/20 to-amber-800/10 border border-amber-500/30 rounded-2xl p-5 space-y-3"><div class="flex items-center gap-2.5"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles w-5 h-5 text-amber-400 shrink-0" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg><div><p class="font-bold text-amber-300 text-sm">Ensayo SIMCE disponible — 2° Medio</p><p class="text-xs text-amber-400/70 mt-0.5">Comprensión lectora, producción escrita y manejo del idioma</p></div></div><div class="flex flex-wrap gap-2"><button class="flex items-center gap-1.5 px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-950 text-sm font-bold rounded-xl transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles w-3.5 h-3.5" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg> Ensayo Nuevo</button><button class="flex items-center gap-1.5 px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-amber-500/30 text-amber-300 text-sm font-semibold rounded-xl transition-all">Ensayo Mensual (banco + nuevas)</button></div></section><section class="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-6 space-y-4"><h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">2. Tipos a generar</h2><div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5"><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-indigo-600/10 border-indigo-500/40 text-slate-200"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-check-big w-4 h-4 text-indigo-400 shrink-0 mt-0.5" aria-hidden="true"><path d="M21 10.656V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12.344"></path><path d="m9 11 3 3L22 4"></path></svg><div><p class="text-sm font-semibold leading-tight">Prueba</p><p class="text-[11px] text-slate-500 mt-0.5">Ítems variados (SM, V/F, desarrollo)</p></div></button><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><p class="text-sm font-semibold leading-tight">Tabla de Especificaciones</p><p class="text-[11px] text-slate-500 mt-0.5">OA × nivel cognitivo × ponderación</p></div></button><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><p class="text-sm font-semibold leading-tight">Rúbrica</p><p class="text-[11px] text-slate-500 mt-0.5">4 niveles de logro por criterio</p></div></button><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><p class="text-sm font-semibold leading-tight">Autoevaluación</p><p class="text-[11px] text-slate-500 mt-0.5">Reflexión del estudiante sobre su proceso</p></div></button><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><p class="text-sm font-semibold leading-tight">Heteroevaluación</p><p class="text-[11px] text-slate-500 mt-0.5">Pauta del docente con criterios de logro</p></div></button><button type="button" class="flex items-start gap-3 p-3.5 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><p class="text-sm font-semibold leading-tight">Coevaluación</p><p class="text-[11px] text-slate-500 mt-0.5">Evaluación entre pares por actitudes</p></div></button></div></section><section class="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-6 space-y-4"><div class="flex items-center justify-between"><h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">3. Objetivos de Aprendizaje</h2><span class="text-xs font-semibold text-rose-400 bg-rose-500/10 border border-rose-500/20 px-2 py-0.5 rounded-lg">1 seleccionado</span></div><div class="space-y-2"><div class="border border-slate-800/60 rounded-xl overflow-hidden"><button type="button" class="w-full flex items-center justify-between px-4 py-3 text-left text-sm font-semibold transition-colors bg-slate-800/60 text-slate-200"><span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg text-[11px] border bg-sky-500/10 border-sky-500/30 text-sky-300">Lectura</span><span class="flex items-center gap-2"><span class="text-[10px] text-slate-600">1/11</span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up w-4 h-4" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg></span></button><div class="divide-y divide-slate-800/40"><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors bg-rose-500/8 hover:bg-rose-500/12"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-check-big w-4 h-4 text-rose-400 shrink-0 mt-0.5" aria-hidden="true"><path d="M21 10.656V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12.344"></path><path d="m9 11 3 3L22 4"></path></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 1.</span><span class="text-xs text-slate-300 leading-relaxed">Leer habitualmente para aprender y recrearse, y seleccionar textos de acuerdo con sus preferencias y propósitos.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 10.</span><span class="text-xs text-slate-300 leading-relaxed">Analizar y evaluar textos de los medios de comunicación, como noticias, reportajes, cartas al director, propaganda o crónicas, considerando: los propósitos explícitos e implícitos del texto, justificando con ejemplos sus afirmaciones sobre dichos propósitos; las estrategias de persuasión utilizadas en el texto (uso del humor, presencia de estereotipos, apelación a los sentimientos, etc.) y evaluándolas; las evidencias que se entregan o se omiten para apoyar una afirmación; los efectos causados por recursos no lingüísticos (diseño, imágenes, disposición gráfica, efectos de audio) y lingüísticos (uso de imperativo, figuras literarias, expresiones populares, palabras en otros idiomas, intertextualidad, modalizaciones, etc.) presentes en el texto; similitudes y diferencias en la forma en que distintas fuentes presentan un mismo hecho; qué elementos del texto influyen en las propias opiniones, percepción de sí mismo y opciones que tomamos.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 11.</span><span class="text-xs text-slate-300 leading-relaxed">Leer y comprender textos no literarios para contextualizar y complementar las lecturas literarias realizadas en clases.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 2.</span><span class="text-xs text-slate-300 leading-relaxed">Reflexionar sobre las diferentes dimensiones de la experiencia humana, propia y ajena, a partir de la lectura de obras literarias y otros textos que forman parte de nuestras herencias culturales, abordando los temas estipulados para el curso y las obras sugeridas para cada uno.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 3.</span><span class="text-xs text-slate-300 leading-relaxed">Analizar las narraciones leídas para enriquecer su comprensión, considerando, cuando sea pertinente: el o los conflictos de la historia; un análisis de los personajes que considere su relación con otros personajes, qué dicen, qué se dice de ellos, sus acciones y motivaciones, sus convicciones y los dilemas que enfrentan; la relación de un fragmento de la obra con el total; cómo el relato está influido por la visión del narrador; personajes tipo (por ejemplo, el pícaro, el avaro, el seductor, la madrastra, etc.), símbolos y tópicos literarios presentes en el texto; las creencias, prejuicios y estereotipos presentes en el relato, a la luz de la visión de mundo de la época en la que fue escrito y su conexión con el mundo actual; el efecto producido por recursos como flashback, indicios, caja china (historia dentro de una historia), historia paralela; relaciones intertextuales con otras obras.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 4.</span><span class="text-xs text-slate-300 leading-relaxed">Analizar los poemas leídos para enriquecer su comprensión, considerando, cuando sea pertinente: los símbolos presentes en el texto y su relación con la totalidad del poema; la actitud del hablante hacia el tema que aborda; el significado o el efecto que produce el uso de lenguaje figurado en el poema; el efecto que tiene el uso de repeticiones (de estructuras, sonidos, palabras o ideas) en el poema; la relación que hay entre un fragmento y el total del poema; relaciones intertextuales con otras obras; las características del soneto.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 5.</span><span class="text-xs text-slate-300 leading-relaxed">Analizar los textos dramáticos leídos o vistos, para enriquecer su comprensión, considerando, cuando sea pertinente: el conflicto y qué problema humano se expresa a través de él; un análisis de los personajes principales que considere su evolución, su relación con otros personajes, qué dicen, qué se dice de ellos, lo que hacen, cómo reaccionan, qué piensan y cuáles son sus motivaciones; personajes tipo, símbolos y tópicos literarios; las creencias, prejuicios y estereotipos presentes en el relato, a la luz de la visión de mundo de la época en la que fue escrito y su conexión con el mundo actual; la atmósfera de la obra y cómo se construye a través de los diálogos, los monólogos, las acciones y las acotaciones; cómo los elementos propios de la puesta en escena aportan a la comprensión de la obra (iluminación, sonido, vestuario, escenografía, actuación); relaciones intertextuales con otras obras.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 6.</span><span class="text-xs text-slate-300 leading-relaxed">Comprender la relevancia de las obras del Siglo de Oro, considerando sus características y el contexto en el que se enmarcan.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 7.</span><span class="text-xs text-slate-300 leading-relaxed">Leer y comprender cuentos latinoamericanos modernos y contemporáneos, considerando sus características y el contexto en el que se enmarcan.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 8.</span><span class="text-xs text-slate-300 leading-relaxed">Formular una interpretación de los textos literarios leídos o vistos, que sea coherente con su análisis, considerando: una hipótesis sobre el sentido de la obra, que muestre un punto de vista personal, histórico, social o universal; una crítica de la obra sustentada en citas o ejemplos; los antecedentes culturales que influyen en la visión que refleja la obra sobre temas como el destino, la muerte, la trascendencia, la guerra u otros; la relación de la obra con la visión de mundo y el contexto histórico en el que se ambienta y/o en el que fue creada, ejemplificando dicha relación.</span></div></button><button type="button" class="w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-800/30"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square w-4 h-4 text-slate-600 shrink-0 mt-0.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg><div><span class="text-xs font-bold text-rose-400 mr-1">OA 9.</span><span class="text-xs text-slate-300 leading-relaxed">Analizar y evaluar textos con finalidad argumentativa, como columnas de opinión, cartas al director, discursos y ensayos, considerando: la tesis, ya sea explícita o implícita, y los argumentos e información que la sostienen; los recursos emocionales que usa el autor para persuadir o convencer al lector, y evaluándolos; fallas evidentes en la argumentación (por ejemplo, exageración, estereotipos, generalizaciones, descalificaciones personales, entre otras); el efecto que produce el uso de modalizadores en el grado de certeza con que se presenta la información; la manera en que el autor organiza el texto; con qué intención el autor usa distintos elementos léxicos valorativos y figuras retóricas; su postura personal frente a lo leído, refutando o apoyando los argumentos que la sustentan.</span></div></button></div></div><div class="border border-slate-800/60 rounded-xl overflow-hidden"><button type="button" class="w-full flex items-center justify-between px-4 py-3 text-left text-sm font-semibold transition-colors bg-slate-900/40 text-slate-400 hover:bg-slate-800/40"><span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg text-[11px] border bg-violet-500/10 border-violet-500/30 text-violet-300">Escritura</span><span class="flex items-center gap-2"><span class="text-[10px] text-slate-600">0/7</span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down w-4 h-4" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg></span></button></div><div class="border border-slate-800/60 rounded-xl overflow-hidden"><button type="button" class="w-full flex items-center justify-between px-4 py-3 text-left text-sm font-semibold transition-colors bg-slate-900/40 text-slate-400 hover:bg-slate-800/40"><span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg text-[11px] border bg-emerald-500/10 border-emerald-500/30 text-emerald-300">Comunicación Oral</span><span class="flex items-center gap-2"><span class="text-[10px] text-slate-600">0/5</span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down w-4 h-4" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg></span></button></div><div class="border border-slate-800/60 rounded-xl overflow-hidden"><button type="button" class="w-full flex items-center justify-between px-4 py-3 text-left text-sm font-semibold transition-colors bg-slate-900/40 text-slate-400 hover:bg-slate-800/40"><span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg text-[11px] border bg-amber-500/10 border-amber-500/30 text-amber-300">Investigación en Lenguaje y Literatura</span><span class="flex items-center gap-2"><span class="text-[10px] text-slate-600">0/1</span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down w-4 h-4" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg></span></button></div></div></section><section class="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-6 space-y-5"><h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">4. Parámetros</h2><div class="space-y-2"><label class="text-xs font-semibold text-slate-400">N° de preguntas / ítems: <span class="text-rose-400">10</span></label><input min="3" max="40" class="w-full accent-rose-500" type="range" value="10"><div class="flex justify-between text-[10px] text-slate-600"><span>3</span><span>20</span><span>40</span></div></div><div class="space-y-2"><label class="text-xs font-semibold text-slate-400">Duración estimada (minutos, opcional)</label><input min="10" max="180" placeholder="ej: 45" class="w-full max-w-xs bg-slate-950/80 border border-slate-800 rounded-xl py-2.5 px-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-rose-500 focus:ring-1 focus:ring-rose-500 transition-all" type="number" value=""></div><div class="space-y-2"><label class="text-xs font-semibold text-slate-400">Nivel de dificultad</label><div class="grid grid-cols-2 gap-2"><button type="button" class="p-3 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700"><p class="text-xs font-bold leading-tight">N1 — Básico</p><p class="text-[10px] text-slate-500 mt-0.5">Comprensión directa, vocabulario accesible</p></button><button type="button" class="p-3 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700"><p class="text-xs font-bold leading-tight">N2 — Intermedio</p><p class="text-[10px] text-slate-500 mt-0.5">Inferencia, aplicación contextual</p></button><button type="button" class="p-3 rounded-xl border text-left transition-all duration-200 bg-slate-950/40 border-slate-800 text-slate-500 hover:border-slate-700"><p class="text-xs font-bold leading-tight">N3 — Avanzado</p><p class="text-[10px] text-slate-500 mt-0.5">Análisis crítico, producción argumentada</p></button><button type="button" class="p-3 rounded-xl border text-left transition-all duration-200 bg-rose-600/10 border-rose-500/40 text-slate-200"><p class="text-xs font-bold leading-tight">Mixto (Recomendado)</p><p class="text-[10px] text-slate-500 mt-0.5">Mezcla proporcional de los tres niveles</p></button></div></div><div class="space-y-2"><label class="text-xs font-semibold text-slate-400">Título personalizado (opcional)</label><input placeholder="ej: Evaluación Formativa Unidad 2 — Comprensión Lectora" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl py-2.5 px-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-rose-500 focus:ring-1 focus:ring-rose-500 transition-all" type="text" value=""></div></section><button class="w-full py-4 px-6 bg-rose-600 hover:bg-rose-500 disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed text-white font-bold rounded-2xl shadow-lg shadow-rose-600/25 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles w-5 h-5" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg><span>Generar Evaluación</span><span class="ml-1 text-sm opacity-70">(1 OA)</span></button>
